<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信效度分析工具</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --gray-bg: #f8fafc;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #334155;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        header { border-bottom: 2px solid var(--border); margin-bottom: 25px; padding-bottom: 10px; }
        h2 { margin: 0; color: #1e293b; display: flex; align-items: center; gap: 10px; }
        .top-desc { font-size: 0.95rem; color: #64748b; margin: 5px 0 0 0; }

        .matrix-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .matrix-table th {
            background: #f8fafc;
            padding: 15px;
            text-align: left;
            font-size: 0.85rem;
            color: #64748b;
            border-bottom: 2px solid var(--border);
        }

        .matrix-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        textarea {
            width: 100%;
            height: 45px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            transition: 0.2s;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .loading-input {
            font-family: "SFMono-Regular", Consolas, monospace;
            color: var(--primary);
            font-weight: 600;
        }

        .res-container { display: flex; flex-direction: column; justify-content: center; min-height: 70px; }
        .res-val { font-family: "Courier New", monospace; font-size: 1.3rem; font-weight: 700; line-height: 1; }
        
        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 800;
            margin-top: 6px;
            display: inline-block;
            width: fit-content;
        }
        
        .pass { color: var(--success); }
        .fail { color: var(--danger); }
        .bg-pass { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .bg-fail { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

        .btn-bar { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; }
        button {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #1d4ed8; }
        .btn-del { background: #fff1f2; color: #f43f5e; font-size: 1.1rem; padding: 5px 12px; }
        .btn-del:hover { background: var(--danger); color: white; }

        .usage-note {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
        }
        
        @media (max-width: 768px) {
            .matrix-table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 12px; padding: 15px; position: relative; }
            td { border: none; padding: 10px 0; }
            td::before { content: attr(data-label); display: block; font-size: 0.75rem; font-weight: 800; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
            .btn-del { position: absolute; top: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>多構面信效度計算機</h2>
        <p class="top-desc">快速計算多構面之平均變異抽取量與組成信度。</p>
    </header>

    <table class="matrix-table">
        <thead>
            <tr>
                <th style="width: 22%;">構面名稱</th>
                <th style="width: 43%;">指標負荷量 (λ) 清單</th>
                <th style="width: 15%;">AVE</th>
                <th style="width: 15%;">CR</th>
                <th style="width: 5%;"></th>
            </tr>
        </thead>
        <tbody id="row-container">
            <tr>
                <td data-label="構面名稱">
                    <textarea placeholder="例如：品牌忠誠度"></textarea>
                </td>
                <td data-label="負荷量清單">
                    <textarea class="loading-input" placeholder="可貼入 .75, .82 等數據" oninput="calculate(this)"></textarea>
                </td>
                <td data-label="組成信度 (CR)">
                    <div class="res-container">
                        <span class="res-val">-</span>
                        <div class="tag-area"></div>
                    </div>
                </td>
                <td data-label="平均變異數 (AVE)">
                    <div class="res-container">
                        <span class="res-val">-</span>
                        <div class="tag-area"></div>
                    </div>
                </td>
                <td>
                    <button class="btn-del" onclick="delRow(this)">✕</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="btn-bar">
        <button class="btn-add" onclick="addRow()">+ 新增構面</button>
        <button style="background:#e2e8f0; color:#475569;" onclick="location.reload()">清空表格</button>
    </div>

    <div class="usage-note">
        <strong>📝 操作說明：</strong><br>
        • 支援輸入省略 0 的小數（例如貼入 <strong>.222</strong> 會自動識別為 <strong>0.222</strong>）。<br>
        • 數據間可用空格、逗號或分行隔開。<br>
        • 標準：<strong>AVE > 0.5</strong>；<strong>CR > 0.7</strong>。<br>
    </div>
</div>

<script>
    function addRow() {
    const body = document.getElementById('row-container');
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td data-label="潛在變項"><textarea placeholder="潛在變項名稱"></textarea></td>
        <td data-label="負荷量清單"><textarea class="loading-input" placeholder="可輸入 .75..." oninput="calculate(this)"></textarea></td>
        <td data-label="收斂效度 (AVE)"><div class="res-container"><span class="res-val">-</span><div class="tag-area"></div></div></td>
        <td data-label="組成信度 (CR)"><div class="res-container"><span class="res-val">-</span><div class="tag-area"></div></div></td>
        <td><button class="btn-del" onclick="delRow(this)">✕</button></td>
    `;
    body.appendChild(tr);
    } 

    function delRow(btn) {
        if(document.querySelectorAll('#row-container tr').length > 1) {
            btn.closest('tr').remove();
        }
    }

    function calculate(el) {
        const row = el.closest('tr');
        const vals = row.querySelectorAll('.res-val');
        const tags = row.querySelectorAll('.tag-area');
        
        const raw = el.value;
        // 修正的正則表達式：支援 .222 這種開頭
        const matches = raw.match(/-?(\d*\.\d+|\d+)/g);

        if (!matches || matches.length === 0) {
            vals.forEach(v => v.innerText = "-");
            tags.forEach(t => t.innerHTML = "");
            return;
        }

        // parseFloat 會自動將 ".222" 轉為 0.222
        const loadings = matches.map(num => parseFloat(num));
        const n = loadings.length;

        const sumL = loadings.reduce((a, b) => a + b, 0);
        const sqOfSumL = Math.pow(sumL, 2);
        const sumError = loadings.reduce((a, b) => a + (1 - Math.pow(b, 2)), 0);
        const sumSqL = loadings.reduce((a, b) => a + Math.pow(b, 2), 0);

        const cr = sqOfSumL / (sqOfSumL + sumError);
        const ave = sumSqL / n;

        updateUI(vals[0], tags[0], ave, 0.5);
        updateUI(vals[1], tags[1], cr, 0.7);
    }

    function updateUI(vEl, tEl, val, limit) {
        vEl.innerText = val.toFixed(3);
        if (val >= limit) {
            vEl.className = "res-val pass";
            tEl.innerHTML = `<span class="badge bg-pass">PASS</span>`;
        } else {
            vEl.className = "res-val fail";
            tEl.innerHTML = `<span class="badge bg-fail">LOW</span>`;
        }
    }
</script>

</body>
</html>
